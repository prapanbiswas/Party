<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050508">
    <title>LuminaParty - Pro Desk</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="view-landing" class="view active">
        <h1 class="glow-text">LUMINAPARTY</h1>
        <p class="subtitle">Pro Controller Desk</p>
        <button class="btn btn-primary" onclick="initHost()">Host Party</button>
        <div class="divider">OR</div>
        <input type="text" id="join-id" class="input-code" placeholder="ROOM CODE" maxlength="4">
        <button class="btn btn-secondary" onclick="initClient()">Join Lights</button>
    </div>

    <div id="view-client" class="view">
        <div id="client-bg"></div>
        <div class="client-overlay">
            <h2 id="client-status">Connecting...</h2>
            <p id="client-address" class="highlight"></p>
        </div>
    </div>

    <div id="view-host" class="view">
        <div class="desk-container">
            
            <div class="desk-header">
                <div class="nav-tabs">
                    <button class="tab-btn active" onclick="switchTab('console')">Console</button>
                    <button class="tab-btn" onclick="switchTab('audio')">Audio Sync</button>
                </div>
                <div class="status-panel">
                    <span>CODE: <span id="room-code" class="highlight">...</span></span>
                    <span>LIGHTS: <span id="conn-count" class="highlight">0</span></span>
                </div>
            </div>

            <div id="tab-console" class="tab-content active">
                
                <div class="panel">
                    <h3>Base Color Faders</h3>
                    <div class="dmx-faders">
                        <div class="fader-group">
                            <input type="range" orient="vertical" id="val-r" min="0" max="255" value="0">
                            <span class="label-r">R</span>
                        </div>
                        <div class="fader-group">
                            <input type="range" orient="vertical" id="val-g" min="0" max="255" value="255">
                            <span class="label-g">G</span>
                        </div>
                        <div class="fader-group">
                            <input type="range" orient="vertical" id="val-b" min="0" max="255" value="136">
                            <span class="label-b">B</span>
                        </div>
                        <div class="fader-group">
                            <input type="range" orient="vertical" id="val-w" min="0" max="255" value="0">
                            <span class="label-w">W</span>
                        </div>
                        <div class="fader-group master">
                            <input type="range" orient="vertical" id="val-master" min="0" max="1" step="0.01" value="1">
                            <span class="label-m">MST</span>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <h3>Effect Layer (Uses Base Color)</h3>
                    <div class="grid-2">
                        <button class="fx-btn active" onclick="setEffect('none', this)">Solid</button>
                        <button class="fx-btn" onclick="setEffect('chase', this)">Chase</button>
                        <button class="fx-btn" onclick="setEffect('split', this)">Split</button>
                        <button class="fx-btn" onclick="setEffect('rainbow', this)">Rainbow</button>
                    </div>
                    <div class="slider-row">
                        <span>Speed</span>
                        <input type="range" id="fx-speed" min="1" max="100" value="50">
                    </div>
                </div>

                <div class="panel danger-panel">
                    <h3>Master Flash Override</h3>
                    <div class="flash-controls">
                        <button class="btn btn-flash" id="btn-flash-toggle">FLASH OFF</button>
                        <div class="flash-settings">
                            <div class="slider-row">
                                <span>Rate</span>
                                <input type="range" id="flash-speed" min="1" max="50" value="25">
                            </div>
                            <div class="slider-row">
                                <span>Color</span>
                                <input type="color" id="flash-color" value="#ffffff">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-audio" class="tab-content">
                <div class="panel">
                    <h3>Audio Reactive Mode</h3>
                    <p class="subtitle">Warning: Overrides manual console while active.</p>
                    <button class="btn btn-primary" id="btn-mic" style="width:100%; margin: 20px 0;" onclick="toggleAudio()">Enable Microphone Sync</button>
                    <div id="audio-viz" class="visualizer"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
